upstream oms_backend {
    server 127.0.0.1:8008;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name ghouse-sourcing.com;

    return 301 https://oms.ghouse-sourcing.com$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name oms.ghouse-sourcing.com;

    client_max_body_size 25m;

    # Update this path only if you cloned the repo somewhere else.
    root /var/www/order-management-system/client/OMS/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name api.ghouse-sourcing.com;

    client_max_body_size 25m;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_pass http://oms_backend;
    }

    location /healthz {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://oms_backend/healthz;
    }
}
